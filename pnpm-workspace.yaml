# Pre-approve build scripts for the packages that need them:
# `esbuild` (Vite) and `sharp` (Astro image optimization) download/build
# native bindings. Without these, pnpm 11+ aborts the install with
# ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: set this to true or false
